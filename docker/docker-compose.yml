version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: asr_postgres
    environment:
      POSTGRES_USER: asr_admin
      POSTGRES_PASSWORD: asr_secure_2024
      POSTGRES_DB: asr_quality_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - asr_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asr_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: asr_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - asr_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 后端API服务
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: asr_backend
    environment:
      - DATABASE_URL=postgresql://asr_admin:asr_secure_2024@postgres:5432/asr_quality_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ASR_API_URL=${ASR_API_URL:-http://localhost:8001}
      - LLM_API_URL=${LLM_API_URL:-http://localhost:8002}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-http://localhost:9000}
      - OSS_ACCESS_KEY=${OSS_ACCESS_KEY:-minioadmin}
      - OSS_SECRET_KEY=${OSS_SECRET_KEY:-minioadmin}
      - OSS_BUCKET=${OSS_BUCKET:-asr-recordings}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - asr_network
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # 前端服务
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: asr_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - asr_network

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: asr_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - asr_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  asr_network:
    driver: bridge
